<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>記事 index</title>
  <style>
    :root{
      --bg:#0f1226; --panel:#1a1e40; --panel2:#20244d;
      --ink:#eef0ff; --sub:#aeb3e0; --muted:#8288c0;
      --line:#2c3163; --violet:#7c5cff; --teal:#31d0aa;
      --grad:linear-gradient(90deg,#7c5cff,#31d0aa);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Noto Sans JP','Hiragino Kaku Gothic ProN','Segoe UI',system-ui,sans-serif;
      background:radial-gradient(1200px 700px at 80% -10%,#241947 0%,var(--bg) 55%);
      color:var(--ink);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      -webkit-font-smoothing:antialiased;
    }
    .frame{
      max-width:960px;
      width:100%;
      padding:32px 24px 40px;
    }
    .card{
      background:linear-gradient(180deg,var(--panel2),var(--panel));
      border-radius:18px;
      border:1px solid var(--line);
      box-shadow:0 28px 70px rgba(0,0,0,.55);
      padding:26px 26px 24px;
    }
    h1{
      margin:0 0 6px;
      font-size:1.5rem;
      letter-spacing:-.01em;
    }
    .desc{
      margin:0 0 20px;
      color:var(--sub);
      font-size:.9rem;
    }
    table{
      width:100%;
      border-collapse:collapse;
      font-size:.9rem;
    }
    th,td{
      text-align:left;
      padding:10px 10px;
    }
    th{
      font-size:.78rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
      border-bottom:1px solid var(--line);
    }
    td{
      border-bottom:1px solid rgba(44,49,99,.7);
      vertical-align:middle;
    }
    tbody tr:last-child td{
      border-bottom:none;
    }
    .title{
      font-weight:600;
      color:#fff;
      font-size:.92rem;
    }
    .type-links{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 12px;
      border-radius:999px;
      font-size:.78rem;
      text-decoration:none;
      color:#eef0ff;
      background:#20244d;
      border:1px solid #2c3163;
      transition:background .15s,border-color .15s,transform .08s;
    }
    .pill span.label{
      font-weight:600;
      letter-spacing:.03em;
    }
    .pill--x{
      background:radial-gradient(circle at 0 0,#e8eaf2 0,#8b93b8 45%,#20244d 100%);
      border-color:#c7cbf5;
      color:#0f1226;
    }
    .pill--tech{
      background:radial-gradient(circle at 0 0,#31d0aa 0,#58d0ff 40%,#20244d 100%);
      border-color:#58d0ff;
    }
    .pill--biz{
      background:radial-gradient(circle at 0 0,#ffb36e 0,#7c5cff 45%,#20244d 100%);
      border-color:#7c5cff;
    }
    .pill small{
      opacity:.85;
      font-size:.74rem;
    }
    .pill--x small{opacity:.7;}
    .pill:focus-visible,
    .pill:hover{
      outline:none;
      border-color:#eef0ff;
      transform:translateY(-1px);
    }
    @media(max-width:640px){
      .card{padding:22px 18px;}
      table{font-size:.88rem;}
    }
  </style>
</head>
<body>
  <div class="frame">
    <main class="card">
      <h1>記事インデックス</h1>
      <p class="desc">同じテーマの記事は1行にまとめ、右側で「X 投稿文」「Tech（技術者向け）」「Biz（非エンジニア向け）」の3種を選べます。</p>
      <table>
        <thead>
          <tr>
            <th scope="col">テーマ</th>
            <th scope="col">タイトル</th>
            <th scope="col">タイプ別リンク</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>claude skill</td>
            <td class="title">「苦手」を仕組みでフォロー — weakness-follow-skill-builder</td>
            <td>
              <div class="type-links">
                <a class="pill pill--x" href="skill/weakness-follow-skill-builder_x_post.txt">
                  <span class="label">X 投稿文</span>
                  <small>そのまま貼れる</small>
                </a>
                <a class="pill pill--tech" href="skill/weakness-follow-skill-builder_tech_blog.html">
                  <span class="label">Tech</span>
                  <small>技術者向け</small>
                </a>
                <a class="pill pill--biz" href="skill/weakness-follow-skill-builder_business_blog.html">
                  <span class="label">Biz</span>
                  <small>非エンジニア向け</small>
                </a>
              </div>
            </td>
          </tr>
          <tr>
            <td>claude skill</td>
            <td class="title">運用に耐えるスキルを作る — guided-skill-builder</td>
            <td>
              <div class="type-links">
                <a class="pill pill--x" href="skill/guided-skill-builder_x_post.txt">
                  <span class="label">X 投稿文</span>
                  <small>そのまま貼れる</small>
                </a>
                <a class="pill pill--tech" href="skill/guided-skill-builder_tech_blog.html">
                  <span class="label">Tech</span>
                  <small>技術者向け</small>
                </a>
                <a class="pill pill--biz" href="skill/guided-skill-builder_business_blog.html">
                  <span class="label">Biz</span>
                  <small>非エンジニア向け</small>
                </a>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </main>
  </div>
</body>
</html>
