<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Noto Sans CJK JP','Segoe UI',sans-serif" role="img" aria-label="weakness-follow-skill-builder サムネイル">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1226"/><stop offset="0.55" stop-color="#171a3a"/><stop offset="1" stop-color="#241947"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/><stop offset="1" stop-color="#31d0aa"/>
    </linearGradient>
    <linearGradient id="cor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2f5c"/><stop offset="1" stop-color="#1b1f42"/>
    </linearGradient>
    <filter id="sf" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g stroke="#ffffff" stroke-opacity="0.04"><path d="M0 158 H1200 M0 316 H1200 M0 474 H1200 M300 0 V630 M600 0 V630 M900 0 V630"/></g>

  <g transform="translate(72,36)">
    <rect x="0" y="0" width="210" height="36" rx="18" fill="#ffffff" fill-opacity="0.08" stroke="url(#acc)" stroke-width="1.5"/>
    <circle cx="24" cy="18" r="6" fill="#31d0aa"/>
    <text x="42" y="24" fill="#c7cbf5" font-size="16" font-weight="700" letter-spacing="1">Claude Skill</text>
  </g>

  <text x="72" y="132" fill="#ffffff" font-size="46" font-weight="800" letter-spacing="-1">「気をつけます」と言ったのに</text>
  <text x="72" y="188" font-size="46" font-weight="800"><tspan fill="#ffffff"></tspan><tspan fill="#ff8f9a">また同じミス</tspan><tspan fill="#ffffff">を繰り返す</tspan></text>
  <text x="74" y="228" fill="#aeb3e0" font-size="20" font-weight="500"><tspan fill="url(#acc)" font-weight="800">weakness-follow-skill-builder</tspan> ─ 苦手を“仕組み”で自動フォロー</text>

  <g transform="translate(72,256)">
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="340" height="134" rx="16" fill="url(#cor)" stroke="#3a3f75" stroke-width="1.5"/>
      <circle cx="34" cy="34" r="16" fill="url(#acc)"/><text x="34" y="40" text-anchor="middle" fill="#0f1226" font-size="17" font-weight="800">1</text>
      <text x="62" y="40" fill="#ffffff" font-size="18" font-weight="800">客観データで裏取り</text>
      <text x="24" y="78" fill="#d5d9ff" font-size="15" font-weight="600">Slack等で本当の原因を特定</text>
      <text x="24" y="104" fill="#9aa0d8" font-size="14">自己申告を疑う</text>
    </g>
    <g transform="translate(358,0)">
      <rect x="0" y="0" width="340" height="134" rx="16" fill="url(#cor)" stroke="#3a3f75" stroke-width="1.5"/>
      <circle cx="34" cy="34" r="16" fill="url(#acc)"/><text x="34" y="40" text-anchor="middle" fill="#0f1226" font-size="17" font-weight="800">2</text>
      <text x="62" y="40" fill="#ffffff" font-size="18" font-weight="800">なぜなぜで深堀り</text>
      <text x="24" y="78" fill="#d5d9ff" font-size="15" font-weight="600">症状でなく根本原因へ</text>
      <text x="24" y="104" fill="#9aa0d8" font-size="14">5 Whysで降りる</text>
    </g>
    <g transform="translate(716,0)">
      <rect x="0" y="0" width="340" height="134" rx="16" fill="url(#cor)" stroke="#3a3f75" stroke-width="1.5"/>
      <circle cx="34" cy="34" r="16" fill="url(#acc)"/><text x="34" y="40" text-anchor="middle" fill="#0f1226" font-size="17" font-weight="800">3</text>
      <text x="62" y="40" fill="#ffffff" font-size="18" font-weight="800">受動・自動・低壁</text>
      <text x="24" y="78" fill="#d5d9ff" font-size="15" font-weight="600">本人が動かず回る</text>
      <text x="24" y="104" fill="#9aa0d8" font-size="14">意識・根性に頼らない</text>
    </g>
  </g>

  <g transform="translate(72,410)">
    <g>
      <rect x="0" y="10" width="392" height="146" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#343a68" stroke-width="1.5"/>
      <text x="22" y="44" fill="#ff8f9a" font-size="15" font-weight="800" letter-spacing="1">BEFORE</text>
      <text x="22" y="80" fill="#c4c8ee" font-size="17" font-weight="600">意識・根性頼みの対策</text>
      <text x="22" y="110" fill="#c4c8ee" font-size="17" font-weight="600">見忘れたら終わり</text>
      <text x="22" y="137" fill="#7d83be" font-size="13">直そうとして直せない</text>
    </g>

    <g transform="translate(406,83)">
      <path d="M0 0 H62" stroke="url(#acc)" stroke-width="11" stroke-linecap="round"/>
      <path d="M50 -22 L88 0 L50 22 Z" fill="#31d0aa"/>
    </g>

    <g transform="translate(500,0)" filter="url(#sf)">
      <rect x="0" y="0" width="556" height="166" rx="20" fill="url(#acc)"/>
      <rect x="0" y="0" width="556" height="166" rx="20" fill="none" stroke="#eafff8" stroke-opacity="0.5" stroke-width="2"/>
      <text x="30" y="44" fill="#0f1226" font-size="18" font-weight="800" letter-spacing="1.5">AFTER</text>
      <g transform="translate(446,20)">
        <rect x="0" y="0" width="86" height="32" rx="16" fill="#0f1226"/>
        <text x="43" y="22" text-anchor="middle" fill="#7ff0d0" font-size="16" font-weight="800" letter-spacing="1">解決</text>
      </g>
      <g transform="translate(30,74)"><path d="M0 8 L6 14 L17 1" fill="none" stroke="#0f1226" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></g>
      <text x="56" y="90" fill="#0f1226" font-size="21" font-weight="800">自動で検知して通知</text>
      <g transform="translate(30,110)"><path d="M0 8 L6 14 L17 1" fill="none" stroke="#0f1226" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></g>
      <text x="56" y="126" fill="#0f1226" font-size="21" font-weight="800">いつものSlackに届く</text>
      <text x="30" y="153" fill="#0f1226" font-size="14" font-weight="700" opacity="0.85">本人スキルに依存しない</text>
    </g>
  </g>
</svg>